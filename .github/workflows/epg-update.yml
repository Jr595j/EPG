# GitHub Actions workflow — fetch, merge, and publish EPG data daily.
#
# SETUP:
#   1. Repo Settings → Secrets → New repository secret:
#      MYBUNNY_EPG_URL = your full MyBunny EPG URL
#   2. Repo Settings → Actions → General → Workflow permissions:
#      Select "Read and write permissions" → Save
#   3. TiviMate EPG URLs:
#      Starlite: https://raw.githubusercontent.com/Jr595j/EPG/main/output/starlite.xml.gz
#      MyBunny:  https://raw.githubusercontent.com/Jr595j/EPG/main/output/mybunny.xml.gz

name: Update EPG

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  update-epg:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Discover new EPG sources
        continue-on-error: true
        run: python discover.py --config config.json

      - name: Patch MyBunny URL into config (from secret)
        env:
          MYBUNNY_EPG_URL: ${{ secrets.MYBUNNY_EPG_URL }}
        run: |
          python -c "
          import json, os
          url = os.environ.get('MYBUNNY_EPG_URL', '')
          if not url:
              print('No MYBUNNY_EPG_URL secret set, skipping patch')
              exit(0)
          for cfg in ['config.json', 'config_mybunny.json']:
              with open(cfg) as f: data = json.load(f)
              for s in data.get('sources', []):
                  if 'mybunny' in s.get('url', '').lower() or 'mybunny' in s.get('name', '').lower():
                      s['url'] = url
                      print(f'  Patched {s[\"name\"]} in {cfg}')
              with open(cfg, 'w') as f: json.dump(data, f, indent=2)
          "

      - name: Fetch and merge EPG (Starlite)
        run: python fetcher.py --config config.json

      - name: Fetch and merge EPG (MyBunny)
        continue-on-error: true
        run: python fetcher.py --config config_mybunny.json

      - name: Validate output
        run: |
          python -c "
          from xml.etree import ElementTree as ET
          import sys
          ok = True
          for label, f in [('starlite', 'cache/merged.xml'), ('mybunny', 'cache_mybunny/merged.xml')]:
              try:
                  root = ET.parse(f).getroot()
                  ch = len(root.findall('channel'))
                  pr = len(root.findall('programme'))
                  print(f'{label}: {ch} channels, {pr} programmes')
                  if ch < 10:
                      print(f'  WARNING: very few channels in {label}')
                      ok = False
              except FileNotFoundError:
                  print(f'{label}: not found (skipping)')
              except Exception as e:
                  print(f'{label}: parse error: {e}')
                  ok = False
          if not ok:
              print('WARNING: output validation had issues but continuing')
          "

      - name: Compress and publish only .gz files
        shell: bash
        run: |
          mkdir -p output
          rm -f output/starlite.xml.gz output/mybunny.xml.gz
          # gzip -9 -f compresses and removes the source .xml
          [ -f cache/merged.xml ] && gzip -9 -c cache/merged.xml > output/starlite.xml.gz && echo "✓ starlite.xml.gz"
          [ -f cache_mybunny/merged.xml ] && gzip -9 -c cache_mybunny/merged.xml > output/mybunny.xml.gz && echo "✓ mybunny.xml.gz"
          ls -lh output/

      - name: Commit updated EPG
        run: |
          git config user.name "EPG Bot"
          git config user.email "epg-bot@users.noreply.github.com"
          # Remove any tracked raw XML files (one-time cleanup)
          git rm --cached output/*.xml 2>/dev/null || true
          git add output/*.xml.gz
          git add discovered_sources.json || true
          git diff --cached --quiet || git commit -m "Update EPG $(date -u +%Y-%m-%d)"
          git fetch origin main
          git rebase origin/main
          git push origin main


